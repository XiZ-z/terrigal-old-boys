<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teams — Terrigal Old Boys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="teams">

<div id="nav-placeholder"></div>

<main>
  <div class="section-title">Teams</div>
  <p class="section-sub">Eight teams, always known simply as Team 1 through Team 8.</p>
  <div class="team-grid" id="team-grid"></div>
</main>

<div id="footer-placeholder"></div>

<script>
  function renderTeams(){
    const grid = document.getElementById('team-grid');
    let html = '';
    for(let t=1;t<=8;t++){
      html += `<div class="team-card"><div class="ball-dot"></div><div class="name">Team ${t}</div></div>`;
    }
    grid.innerHTML = html;
  }
  renderTeams();
</script>
<script src="nav.js"></script>
</body>
</html>
