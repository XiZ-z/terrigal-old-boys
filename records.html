<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Records — Terrigal Old Boys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="records">

<div id="nav-placeholder"></div>

<main>
  <div class="section-title">Season Records</div>
  <p class="section-sub">Standout results and streaks from the season so far.</p>
  <div class="records-grid" id="records-grid"></div>
</main>

<div id="footer-placeholder"></div>

<script src="data.js"></script>
<script>
  // byGames=false compares on sets instead of games -- "most lopsided sets"
  // needs the sets winner, not whoever happened to win more games that night.
  function winnerLoser(m, byGames){
    const useGames = byGames !== false;
    const aVal = useGames ? m.gamesA : m.setsA;
    const bVal = useGames ? m.gamesB : m.setsB;
    return aVal > bVal
      ? { winner: m.teamA, loser: m.teamB, winnerGames: m.gamesA, loserGames: m.gamesB }
      : { winner: m.teamB, loser: m.teamA, winnerGames: m.gamesB, loserGames: m.gamesA };
  }

  function recordCard({ team, teamClass, label, value, detail }){
    const badge = team
      ? `<div class="record-team${teamClass ? ' ' + teamClass : ''}">${team}</div>`
      : '';
    return `
      <div class="rule-card record-card">
        ${badge}
        <h4>${label}</h4>
        <div class="record-value">${value}</div>
        <div class="record-detail">${detail}</div>
      </div>`;
  }

  function renderRecords(){
    const grid = document.getElementById('records-grid');
    const rec = computeSeasonRecords();

    if(!rec){
      grid.innerHTML = `<div class="rule-card record-card"><h4>No results yet</h4><div class="record-detail">Check back after Round 1 for the season's first standout results.</div></div>`;
      return;
    }

    const cards = [];

    const bw = winnerLoser(rec.biggestWin);
    cards.push(recordCard({
      team: `Team ${bw.winner}`,
      label: 'Biggest win margin',
      value: `${rec.biggestWin.gameDiff} games`,
      detail: `beat Team ${bw.loser} ${bw.winnerGames}&ndash;${bw.loserGames} in Round ${rec.biggestWin.roundNum}`,
    }));

    const ms = winnerLoser(rec.mostLopsidedSets, false);
    cards.push(recordCard({
      team: `Team ${ms.winner}`,
      label: 'Most lopsided sets',
      value: `${rec.mostLopsidedSets.setsA}&ndash;${rec.mostLopsidedSets.setsB}`,
      detail: `over Team ${ms.loser} in Round ${rec.mostLopsidedSets.roundNum}`,
    }));

    const cl = rec.closest;
    if(cl.gameDiff === 0){
      cards.push(recordCard({
        team: `Team ${cl.teamA} &amp; Team ${cl.teamB}`,
        label: 'Closest match',
        value: `Drew on games`,
        detail: `${cl.gamesA}&ndash;${cl.gamesB} in Round ${cl.roundNum}`,
      }));
    } else {
      const cw = winnerLoser(cl);
      cards.push(recordCard({
        team: `Team ${cw.winner}`,
        label: 'Closest match',
        value: `${cl.gameDiff} game${cl.gameDiff === 1 ? '' : 's'}`,
        detail: `beat Team ${cw.loser} ${cw.winnerGames}&ndash;${cw.loserGames} in Round ${cl.roundNum}`,
      }));
    }

    if(rec.bestWinStreak){
      cards.push(recordCard({
        team: `Team ${rec.bestWinStreak.team}`,
        label: 'Longest win streak',
        value: `${rec.bestWinStreak.streak} match${rec.bestWinStreak.streak === 1 ? '' : 'es'}`,
        detail: `and counting`,
      }));
    }

    if(rec.bestLossStreak){
      cards.push(recordCard({
        team: `Team ${rec.bestLossStreak.team}`,
        teamClass: 'record-team--loss',
        label: 'Longest losing streak',
        value: `${rec.bestLossStreak.streak} match${rec.bestLossStreak.streak === 1 ? '' : 'es'}`,
        detail: `due a win`,
      }));
    }

    grid.innerHTML = cards.join('');
  }
  renderRecords();
</script>
<script src="nav.js"></script>
</body>
</html>
