<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Records — Terrigal Old Boys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="records">

<div id="nav-placeholder"></div>

<main>
  <div class="section-title">Season Records</div>
  <p class="section-sub">Standout results and streaks from the season so far.</p>
  <div class="records-grid" id="records-grid"></div>
</main>

<div id="footer-placeholder"></div>

<script src="data.js"></script>
<script>
  function winnerLoser(m){
    return m.gamesA > m.gamesB
      ? { winner: m.teamA, loser: m.teamB, winnerGames: m.gamesA, loserGames: m.gamesB }
      : { winner: m.teamB, loser: m.teamA, winnerGames: m.gamesB, loserGames: m.gamesA };
  }

  function renderRecords(){
    const grid = document.getElementById('records-grid');
    const rec = computeSeasonRecords();

    if(!rec){
      grid.innerHTML = `<div class="rule-card record-card"><h4>No results yet</h4><div class="record-detail">Check back after Round 1 for the season's first standout results.</div></div>`;
      return;
    }

    const cards = [];

    const bw = winnerLoser(rec.biggestWin);
    cards.push(`
      <div class="rule-card record-card">
        <h4>Biggest win margin</h4>
        <div class="record-value">${rec.biggestWin.gameDiff} games</div>
        <div class="record-detail">Team ${bw.winner} beat Team ${bw.loser} ${bw.winnerGames}&ndash;${bw.loserGames} in Round ${rec.biggestWin.roundNum}</div>
      </div>`);

    const ms = winnerLoser(rec.mostLopsidedSets);
    cards.push(`
      <div class="rule-card record-card">
        <h4>Most lopsided sets</h4>
        <div class="record-value">${rec.mostLopsidedSets.setsA}&ndash;${rec.mostLopsidedSets.setsB}</div>
        <div class="record-detail">Team ${ms.winner} over Team ${ms.loser} in Round ${rec.mostLopsidedSets.roundNum}</div>
      </div>`);

    const cl = rec.closest;
    const closestDetail = cl.gameDiff === 0
      ? `Team ${cl.teamA} drew Team ${cl.teamB} ${cl.gamesA}&ndash;${cl.gamesB} on games in Round ${cl.roundNum}`
      : `Team ${cl.teamA} ${cl.gamesA}&ndash;${cl.gamesB} Team ${cl.teamB} in Round ${cl.roundNum}`;
    cards.push(`
      <div class="rule-card record-card">
        <h4>Closest match</h4>
        <div class="record-value">${cl.gameDiff} game${cl.gameDiff === 1 ? '' : 's'}</div>
        <div class="record-detail">${closestDetail}</div>
      </div>`);

    if(rec.bestWinStreak){
      cards.push(`
        <div class="rule-card record-card">
          <h4>Longest win streak</h4>
          <div class="record-value">${rec.bestWinStreak.streak} match${rec.bestWinStreak.streak === 1 ? '' : 'es'}</div>
          <div class="record-detail">Team ${rec.bestWinStreak.team}</div>
        </div>`);
    }

    if(rec.bestLossStreak){
      cards.push(`
        <div class="rule-card record-card">
          <h4>Longest losing streak</h4>
          <div class="record-value">${rec.bestLossStreak.streak} match${rec.bestLossStreak.streak === 1 ? '' : 'es'}</div>
          <div class="record-detail">Team ${rec.bestLossStreak.team}</div>
        </div>`);
    }

    grid.innerHTML = cards.join('');
  }
  renderRecords();
</script>
<script src="nav.js"></script>
</body>
</html>
