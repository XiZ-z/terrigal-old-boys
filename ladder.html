<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ladder — Terrigal Old Boys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="ladder">

<div id="nav-placeholder"></div>

<main>
  <div class="section-title">Ladder</div>
  <p class="section-sub">Updated after each week's score sheets are entered. 1 pt per set, 0.5 for a drawn set, plus bonus points for most sets and most games. Ties are broken by overall set differential, then overall game differential if needed (shown below each score).</p>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>#</th><th>Team</th><th class="num-col"><span class="played-label-full">Played</span><span class="played-label-short">P</span></th><th class="num-col">Sets<span class="th-sub">won&ndash;lost</span></th><th class="num-col">Games<span class="th-sub">won&ndash;lost</span></th><th class="num-col">Pts</th></tr>
      </thead>
      <tbody id="ladder-body"></tbody>
    </table>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="data.js"></script>
<script>
  function statCell(forVal, againstVal){
    if(forVal > againstVal){
      return `<span class="stat-win">${forVal}</span>–<span class="stat-loss">${againstVal}</span>`;
    }
    if(againstVal > forVal){
      return `<span class="stat-loss">${forVal}</span>–<span class="stat-win">${againstVal}</span>`;
    }
    return `<span class="stat-even">${forVal}</span>–<span class="stat-even">${againstVal}</span>`;
  }

  function formatDiff(diff){
    if(diff > 0) return `+${diff}`;
    if(diff < 0) return `${diff}`;
    return '0';
  }

  function buildTieNotes(rows){
    const notes = rows.map(() => '');
    let i = 0;
    while(i < rows.length){
      let j = i;
      while(j+1 < rows.length && rows[j+1].points === rows[i].points) j++;
      const clusterSize = j - i + 1;
      if(clusterSize === 2){
        const setDiffI = rows[i].setsFor - rows[i].setsAgainst;
        const setDiffJ = rows[j].setsFor - rows[j].setsAgainst;
        if(setDiffI !== setDiffJ){
          notes[i] = `<span class="tie-note stat-win">Ahead on set diff</span>`;
          notes[j] = `<span class="tie-note stat-loss">Behind on set diff</span>`;
        } else {
          const gameDiffI = rows[i].gamesFor - rows[i].gamesAgainst;
          const gameDiffJ = rows[j].gamesFor - rows[j].gamesAgainst;
          if(gameDiffI !== gameDiffJ){
            notes[i] = `<span class="tie-note stat-win">Ahead on game diff</span>`;
            notes[j] = `<span class="tie-note stat-loss">Behind on game diff</span>`;
          } else {
            notes[i] = notes[j] = `<span class="tie-note">Fully tied — needs review</span>`;
          }
        }
      } else if(clusterSize >= 3){
        for(let k=i;k<=j;k++){
          notes[k] = `<span class="tie-note">${clusterSize}-way tie — overall diff</span>`;
        }
      }
      i = j+1;
    }
    return notes;
  }

  function renderLadder(){
    const rows = computeLadder();
    const tieNotes = buildTieNotes(rows);
    const body = document.getElementById('ladder-body');
    body.innerHTML = rows.map((r, i) => `
      <tr>
        <td class="rank-cell">${i+1}</td>
        <td><strong>Team ${r.team}</strong></td>
        <td class="mono-cell num-col">${r.played}</td>
        <td class="mono-cell num-col">${statCell(r.setsFor, r.setsAgainst)}<span class="diff-line">${formatDiff(r.setsFor - r.setsAgainst)}</span></td>
        <td class="mono-cell num-col">${statCell(r.gamesFor, r.gamesAgainst)}<span class="diff-line">${formatDiff(r.gamesFor - r.gamesAgainst)}</span></td>
        <td class="mono-cell num-col">${r.points}${tieNotes[i]}</td>
      </tr>
    `).join('');
  }
  renderLadder();
</script>
<script src="nav.js"></script>
</body>
</html>
